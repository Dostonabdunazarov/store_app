server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ВАЖНО: НЕ включаем `gzip on`. Сжатие делают Caddy (encode) и Cloudflare
    # на краю. Если nginx проекта сам жмёт, крупные бандлы уходят к Caddy как
    # chunked-апстрим → Caddy отдаёт Content-Length: 0 → белый экран.
    # (Проверено на боли, см. corpdev/infra/README.md.)

    # Vite отдаёт ассеты с хешем в имени — кэшируем максимально жёстко.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA history fallback — любой маршрут возвращает index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # index.html не кэшируем, чтобы новый деплой (с новыми ссылками на
    # хешированные ассеты) сразу вступал в силу.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }
}
